<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Multi-Provider Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #6366f1;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617;
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .provider-card {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .provider-card.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.1);
        }

        pre code {
            border-radius: 8px;
            font-size: 0.85rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body class="flex items-center justify-center p-0 md:p-4">

    <div class="w-full max-w-6xl h-screen md:h-[95vh] flex flex-col md:flex-row glass md:rounded-3xl overflow-hidden relative shadow-2xl">
        
        <!-- SIDEBAR -->
        <aside class="hidden md:flex w-72 border-r border-white/5 flex-col bg-slate-950/50">
            <div class="p-6">
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-3 h-3 rounded-full bg-indigo-500 shadow-[0_0_10px_rgba(99,102,241,0.5)]"></div>
                    <h1 class="font-bold tracking-tighter text-xl">Nexus<span class="text-indigo-500">AI</span></h1>
                </div>
                <button onclick="createNewChat()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14m-7-7v14"/></svg>
                    Nouveau Chat
                </button>
            </div>
            
            <div id="history-list" class="flex-1 overflow-y-auto px-4 space-y-2 custom-scrollbar"></div>

            <div class="p-4 border-t border-white/5">
                <button onclick="openSettings()" class="w-full flex items-center gap-3 p-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-xl transition-all text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Configuration API
                </button>
            </div>
        </aside>

        <!-- MAIN CHAT -->
        <main class="flex-1 flex flex-col min-w-0 bg-slate-900/30">
            <header class="p-4 border-b border-white/5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="active-provider-icon" class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
                    </div>
                    <div>
                        <h2 id="chat-title" class="font-bold text-sm">Nexus Chat</h2>
                        <p id="model-badge" class="text-[10px] text-slate-500 font-mono">Prêt</p>
                    </div>
                </div>
            </header>

            <div id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 custom-scrollbar">
                <div class="h-full flex flex-col items-center justify-center text-slate-500 opacity-50">
                    <p class="text-sm italic">Configurez votre API pour commencer.</p>
                </div>
            </div>

            <div id="typing-indicator" class="px-6 py-2 hidden">
                <div class="flex gap-1">
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                </div>
            </div>

            <footer class="p-4 md:p-6">
                <div class="max-w-4xl mx-auto flex items-end gap-2 bg-white/5 border border-white/10 rounded-2xl p-2 focus-within:border-indigo-500/50 transition-all">
                    <textarea id="user-input" rows="1" placeholder="Ecrivez votre message..." class="flex-1 bg-transparent border-none focus:ring-0 text-slate-200 p-3 resize-none outline-none custom-scrollbar" style="max-height: 200px"></textarea>
                    <button id="send-btn" class="bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl transition-all disabled:opacity-30 disabled:cursor-not-allowed shadow-lg shadow-indigo-600/20">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="m5 12 7-7 7 7M12 19V5"/></svg>
                    </button>
                </div>
            </footer>
        </main>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settings-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="glass max-w-2xl w-full rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-slate-900">
                <h3 class="font-bold text-lg">Configuration de l'IA</h3>
                <button onclick="closeSettings()" class="text-slate-400 hover:text-white"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1 custom-scrollbar space-y-8">
                <section>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4 block">1. Fournisseur API</label>
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3" id="provider-grid"></div>
                </section>

                <section class="space-y-4">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block">2. Authentification</label>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between items-end mb-1.5">
                                <span class="text-xs text-slate-400">Clé API</span>
                                <a id="get-key-link" href="#" target="_blank" class="text-[10px] text-indigo-400 hover:underline">Obtenir →</a>
                            </div>
                            <div class="relative">
                                <input type="password" id="api-key-input" class="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 transition-all pr-10" placeholder="Collez votre clé ici">
                                <div id="key-status" class="absolute right-3 top-3.5 hidden">
                                    <svg class="text-emerald-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
                                </div>
                            </div>
                            <p id="key-hint" class="text-[10px] text-slate-500 mt-1.5"></p>
                        </div>
                    </div>
                </section>

                <section>
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-4">3. Modèle</label>
                    <select id="model-select" class="w-full bg-slate-950 border border-white/10 rounded-xl p-3 text-sm outline-none focus:border-indigo-500 transition-all cursor-pointer"></select>
                </section>
            </div>

            <div class="p-6 bg-slate-900 border-t border-white/10">
                <button onclick="saveAndApply()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-xl font-bold transition-all shadow-xl shadow-indigo-600/20">
                    Sauvegarder
                </button>
            </div>
        </div>
    </div>

    <script>
        const PROVIDERS = {
            google: {
                name: "Google Gemini",
                icon: "✨",
                baseUrl: "https://generativelanguage.googleapis.com/v1beta",
                models: ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-2.0-flash-exp"],
                keyLink: "https://aistudio.google.com/app/apikey",
                keyPrefix: "AIza",
                type: "google_native" // Format spécial
            },
            openai: {
                name: "OpenAI",
                icon: "🤖",
                baseUrl: "https://api.openai.com/v1",
                models: ["gpt-4o", "gpt-4o-mini", "gpt-3.5-turbo"],
                keyLink: "https://platform.openai.com/api-keys",
                keyPrefix: "sk-",
                type: "openai_format"
            },
            groq: {
                name: "Groq (Llama/Mixtral)",
                icon: "⚡",
                baseUrl: "https://api.groq.com/openai/v1",
                models: ["llama-3.1-70b-versatile", "llama-3.1-8b-instant", "mixtral-8x7b-32768"],
                keyLink: "https://console.groq.com/keys",
                keyPrefix: "gsk_",
                type: "openai_format"
            }
        };

        let state = {
            currentChatId: null,
            chats: JSON.parse(localStorage.getItem('nexus_chats_v2')) || [],
            config: JSON.parse(localStorage.getItem('nexus_config_v2')) || {
                provider: "google",
                apiKey: "",
                model: "gemini-1.5-flash"
            }
        };

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }

        function selectProvider(id) {
            state.config.provider = id;
            document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('active'));
            const pData = PROVIDERS[id];
            
            const select = document.getElementById('model-select');
            select.innerHTML = '';
            pData.models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.innerText = m;
                select.appendChild(opt);
            });

            document.getElementById('get-key-link').href = pData.keyLink;
            document.getElementById('key-hint').innerText = `Format: ${pData.keyPrefix}...`;
            validateKey(document.getElementById('api-key-input').value);
            
            // Highlight card
            const cards = document.querySelectorAll('.provider-card');
            const idx = Object.keys(PROVIDERS).indexOf(id);
            if(cards[idx]) cards[idx].classList.add('active');
        }

        function validateKey(val) {
            const prefix = PROVIDERS[state.config.provider].keyPrefix;
            const status = document.getElementById('key-status');
            if(val && val.startsWith(prefix)) status.classList.remove('hidden');
            else status.classList.add('hidden');
        }

        function initSettings() {
            const grid = document.getElementById('provider-grid');
            grid.innerHTML = '';
            Object.entries(PROVIDERS).forEach(([id, data]) => {
                const card = document.createElement('div');
                card.className = `provider-card glass p-4 rounded-2xl flex flex-col items-center gap-2 text-center ${state.config.provider === id ? 'active' : ''}`;
                card.innerHTML = `<span class="text-2xl">${data.icon}</span><span class="text-[10px] font-bold">${data.name}</span>`;
                card.onclick = () => selectProvider(id);
                grid.appendChild(card);
            });
            document.getElementById('api-key-input').value = state.config.apiKey;
            selectProvider(state.config.provider);
            document.getElementById('model-select').value = state.config.model;
        }

        function saveAndApply() {
            state.config.apiKey = document.getElementById('api-key-input').value.trim();
            state.config.model = document.getElementById('model-select').value;
            localStorage.setItem('nexus_config_v2', JSON.stringify(state.config));
            document.getElementById('model-badge').innerText = `${state.config.provider} / ${state.config.model}`;
            closeSettings();
        }

        function appendMessage(role, content) {
            if(chatBox.querySelector('.opacity-50')) chatBox.innerHTML = '';
            const div = document.createElement('div');
            div.className = `message-bubble flex flex-col ${role === 'user' ? 'items-end' : 'items-start'}`;
            const inner = document.createElement('div');
            inner.className = `max-w-[85%] p-4 rounded-2xl text-sm ${role === 'user' ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-white/5 border border-white/10 text-slate-200 rounded-tl-none prose prose-invert'}`;
            inner.innerHTML = role === 'user' ? content : marked.parse(content);
            div.appendChild(inner);
            chatBox.appendChild(div);
            inner.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if(!text || !state.config.apiKey) return;

            if(!state.currentChatId) {
                state.currentChatId = Date.now().toString();
                state.chats.push({id: state.currentChatId, title: text.slice(0, 20), messages: []});
            }
            const chat = state.chats.find(c => c.id === state.currentChatId);

            appendMessage('user', text);
            chat.messages.push({role: 'user', content: text});
            userInput.value = '';

            document.getElementById('typing-indicator').classList.remove('hidden');

            try {
                let url, body, headers;
                const p = PROVIDERS[state.config.provider];

                if (p.type === "google_native") {
                    // FORMAT GOOGLE NATIF
                    url = `${p.baseUrl}/models/${state.config.model}:generateContent?key=${state.config.apiKey}`;
                    headers = { 'Content-Type': 'application/json' };
                    body = JSON.stringify({
                        contents: chat.messages.map(m => ({
                            role: m.role === 'assistant' ? 'model' : 'user',
                            parts: [{ text: m.content }]
                        }))
                    });
                } else {
                    // FORMAT OPENAI
                    url = `${p.baseUrl}/chat/completions`;
                    headers = { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.config.apiKey}`
                    };
                    body = JSON.stringify({
                        model: state.config.model,
                        messages: chat.messages
                    });
                }

                const response = await fetch(url, { method: 'POST', headers, body });
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || data[0]?.error?.message || "Erreur de configuration");
                }

                let aiMsg = "";
                if (p.type === "google_native") {
                    aiMsg = data.candidates[0].content.parts[0].text;
                } else {
                    aiMsg = data.choices[0].message.content;
                }

                appendMessage('assistant', aiMsg);
                chat.messages.push({role: 'assistant', content: aiMsg});
                localStorage.setItem('nexus_chats_v2', JSON.stringify(state.chats));

            } catch (err) {
                appendMessage('assistant', `❌ **Erreur :** ${err.message}`);
            } finally {
                document.getElementById('typing-indicator').classList.add('hidden');
            }
        }

        window.onload = () => {
            initSettings();
            document.getElementById('api-key-input').oninput = (e) => validateKey(e.target.value);
            document.getElementById('send-btn').onclick = handleSend;
            userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
        };
    </script>
</body>
</html>
