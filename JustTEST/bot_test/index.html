<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Neural Monolith</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
        }

        canvas {
            display: block;
        }

        #ui-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        body:active #ui-overlay {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">Interact to Distort</div>

    <script>
        let scene, camera, renderer, clock, particles, innerCore, ring;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        const PARTICLE_COUNT = 8000;
        const VIEW_DISTANCE = 5;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = VIEW_DISTANCE;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Setup Geometry
            createMonolith();
            createBackground();
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ff88, 2, 10);
            pointLight.position.set(2, 2, 2);
            scene.add(pointLight);

            const purpleLight = new THREE.PointLight(0x7700ff, 2, 10);
            purpleLight.position.set(-2, -2, 2);
            scene.add(purpleLight);

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('touchstart', onTouchMove, false);
            document.addEventListener('touchmove', onTouchMove, false);
        }

        function createMonolith() {
            // The Core: A Refractive Icosahedron
            const coreGeom = new THREE.IcosahedronGeometry(1, 0);
            const coreMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                emissive: 0x111111,
                specular: 0xffffff,
                shininess: 100,
                flatShading: true,
                transparent: true,
                opacity: 0.8,
                wireframe: false
            });
            innerCore = new THREE.Mesh(coreGeom, coreMat);
            scene.add(innerCore);

            // The Particle Cloud
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);
            const colors = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Spherical distribution
                const r = 1.5 + Math.random() * 1.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);

                sizes[i] = Math.random() * 2.0;

                // Color gradient (Cyan to Purple)
                const mix = Math.random();
                colors[i * 3] = mix * 0.2; // R
                colors[i * 3 + 1] = 0.5 + (1 - mix) * 0.5; // G
                colors[i * 3 + 2] = 0.8 + mix * 0.2; // B
            }

            const partGeom = new THREE.BufferGeometry();
            partGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            partGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const partMat = new THREE.PointsMaterial({
                size: 0.015,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(partGeom, partMat);
            scene.add(particles);

            // An outer faint ring
            const ringGeom = new THREE.TorusGeometry(2.5, 0.005, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.3 });
            ring = new THREE.Mesh(ringGeom, ringMat);
            scene.add(ring);
        }

        function createBackground() {
            // Faint stars for depth
            const starGeom = new THREE.BufferGeometry();
            const starPos = new Float32Array(3000);
            for(let i=0; i<3000; i++) starPos[i] = (Math.random() - 0.5) * 50;
            starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.01, transparent: true, opacity: 0.2 });
            scene.add(new THREE.Points(starGeom, starMat));
        }

        function onMouseMove(event) {
            targetX = (event.clientX - window.innerWidth / 2) * 0.001;
            targetY = (event.clientY - window.innerHeight / 2) * 0.001;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                targetX = (event.touches[0].clientX - window.innerWidth / 2) * 0.002;
                targetY = (event.touches[0].clientY - window.innerHeight / 2) * 0.002;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Smooth damping for interaction
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;

            // Rotate Inner Core
            innerCore.rotation.x = time * 0.2;
            innerCore.rotation.y = time * 0.3;
            innerCore.scale.setScalar(1 + Math.sin(time * 2) * 0.05);

            // Animate Particles
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const ix = i * 3;
                const iy = i * 3 + 1;
                const iz = i * 3 + 2;

                // Subtle organic "breathing"
                const noise = Math.sin(time * 0.5 + i) * 0.002;
                positions[ix] += Math.cos(time + i) * 0.001 + mouseX * 0.01;
                positions[iy] += Math.sin(time + i) * 0.001 + mouseY * 0.01;
                
                // Return to center pull
                positions[ix] *= 0.999;
                positions[iy] *= 0.999;
                positions[iz] *= 0.999;
            }
            particles.geometry.attributes.position.needsUpdate = true;
            
            // Movement based on mouse
            particles.rotation.y += 0.002 + mouseX * 0.05;
            particles.rotation.x += mouseY * 0.05;

            ring.rotation.z = time * 0.1;
            ring.rotation.x = Math.PI / 2 + mouseY;

            // Camera subtle drift
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        window.onload = init;
        animate();
    </script>
</body>
</html>
