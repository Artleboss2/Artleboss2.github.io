<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Monolith</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', sans-serif;
            font-weight: 200;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 10px;
            pointer-events: none;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">Ethereal Resonance Active</div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        /**
         * THE NEURAL MONOLITH
         * A generative 3D experience using custom vertex displacement and 
         * simulated light refraction.
         */

        let scene, camera, renderer, clock;
        let monolith, particles, dust;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;

        const init = () => {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 2); 
            scene.add(ambientLight);

            const mainLight = new THREE.PointLight(0x00f2ff, 2, 50);
            mainLight.position.set(5, 5, 5);
            scene.add(mainLight);

            const backLight = new THREE.PointLight(0xff0080, 1, 50);
            backLight.position.set(-5, -2, -2);
            scene.add(backLight);

            // Create the central Monolith
            const geometry = new THREE.IcosahedronGeometry(1.5, 64);
            
            // Custom Material with shaders-like behavior using standard material properties
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x111111,
                metalness: 0.9,
                roughness: 0.1,
                transmission: 0.5,
                thickness: 2,
                ior: 1.5,
                reflectivity: 1,
                iridescence: 1,
                iridescenceIOR: 1.3,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                wireframe: false
            });

            monolith = new THREE.Mesh(geometry, material);
            scene.add(monolith);

            // Floating Nebula Particles
            const pGeometry = new THREE.BufferGeometry();
            const pCount = 2000;
            const pCoords = new Float32Array(pCount * 3);
            for(let i = 0; i < pCount * 3; i++) {
                pCoords[i] = (Math.random() - 0.5) * 15;
            }
            pGeometry.setAttribute('position', new THREE.BufferAttribute(pCoords, 3));
            
            const pMaterial = new THREE.PointsMaterial({
                size: 0.015,
                color: 0xffffff,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending
            });
            
            particles = new THREE.Points(pGeometry, pMaterial);
            scene.add(particles);

            // Interaction
            window.addEventListener('mousemove', (e) => {
                targetX = (e.clientX - window.innerWidth / 2) * 0.001;
                targetY = (e.clientY - window.innerHeight / 2) * 0.001;
            });

            window.addEventListener('resize', onWindowResize);
            
            animate();
        };

        const onWindowResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        const animate = () => {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Smoothly interpolate mouse movement
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;

            // Animate Monolith Displacement (Vertex simulation)
            const positions = monolith.geometry.attributes.position;
            const originalPositions = monolith.geometry.attributes.position.array;
            
            // Subtle rotation
            monolith.rotation.y = time * 0.2 + mouseX;
            monolith.rotation.x = time * 0.15 + mouseY;

            // Particle drift
            particles.rotation.y = time * 0.05;
            particles.position.z = Math.sin(time * 0.5) * 0.5;

            // Camera movement
            camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
            camera.position.y += (-mouseY * 2 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);

            // Pulse the UI intensity
            const ui = document.getElementById('ui-overlay');
            if(ui) ui.style.opacity = 0.2 + Math.sin(time) * 0.1;

            renderer.render(scene, camera);
        };

        window.onload = init;
    </script>
</body>
</html>
