<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Singularity</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            cursor: crosshair;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: fixed;
            bottom: 30px;
            left: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    <div class="overlay">Interact to warp the field</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // High-end Generative Experience using Particle Physics and Noise
        let scene, camera, renderer, particles, geometry;
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        const PARTICLE_COUNT = 80000;
        
        const init = () => {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 400;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Create Geometry
            geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(PARTICLE_COUNT * 3);
            const colors = new Float32Array(PARTICLE_COUNT * 3);
            const sizes = new Float32Array(PARTICLE_COUNT);

            const color1 = new THREE.Color(0x4400ff); // Deep Blue
            const color2 = new THREE.Color(0x00ffff); // Cyan
            const color3 = new THREE.Color(0xff0088); // Hot Pink

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                // Initialize in a sphere
                const r = 150 + Math.random() * 100;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);

                // Blend colors based on position
                const mixedColor = color1.clone().lerp(color2, Math.random());
                if(Math.random() > 0.9) mixedColor.lerp(color3, 0.5);
                
                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;

                sizes[i] = Math.random() * 1.5 + 0.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const material = new THREE.PointsMaterial({
                size: 1.2,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('touchstart', onTouchMove, false);
            document.addEventListener('touchmove', onTouchMove, false);

            animate();
        };

        const onMouseMove = (event) => {
            targetX = (event.clientX - window.innerWidth / 2) * 0.5;
            targetY = (event.clientY - window.innerHeight / 2) * 0.5;
        };

        const onTouchMove = (event) => {
            if (event.touches.length > 0) {
                targetX = (event.touches[0].clientX - window.innerWidth / 2) * 0.5;
                targetY = (event.touches[0].clientY - window.innerHeight / 2) * 0.5;
            }
        };

        const onWindowResize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };

        const animate = () => {
            requestAnimationFrame(animate);
            render();
        };

        const render = () => {
            const time = Date.now() * 0.0001;

            // Smooth camera movement
            mouseX += (targetX - mouseX) * 0.05;
            mouseY += (targetY - mouseY) * 0.05;
            
            camera.position.x += (mouseX - camera.position.x) * 0.03;
            camera.position.y += (-mouseY - camera.position.y) * 0.03;
            camera.lookAt(scene.position);

            const positions = geometry.attributes.position.array;
            
            // Dynamic warp field logic
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                // Original spherical coordinates logic applied as a force
                const x = positions[i3];
                const y = positions[i3 + 1];
                const z = positions[i3 + 2];

                // Simulating a "living" organism movement using trig functions
                const noise = Math.sin(x * 0.01 + time) * Math.cos(y * 0.01 + time) * Math.sin(z * 0.01 + time);
                
                // Apply subtle vibration/flow
                positions[i3] += Math.sin(time * 2 + i) * 0.2;
                positions[i3 + 1] += Math.cos(time * 3 + i) * 0.2;
                positions[i3 + 2] += Math.sin(time * 1.5 + i) * 0.2;

                // React to mouse distance
                const dx = x - mouseX;
                const dy = y + mouseY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    positions[i3] += dx * force * 0.02;
                    positions[i3 + 1] += dy * force * 0.02;
                }
                
                // Keep them within a soft boundary
                const dCenter = Math.sqrt(x*x + y*y + z*z);
                if (dCenter > 400) {
                    positions[i3] *= 0.98;
                    positions[i3 + 1] *= 0.98;
                    positions[i3 + 2] *= 0.98;
                }
            }

            geometry.attributes.position.needsUpdate = true;
            
            // Subtle rotation of the whole system
            particles.rotation.y += 0.001;
            particles.rotation.z += 0.0005;

            renderer.render(scene, camera);
        };

        window.onload = init;
    </script>
</body>
</html>
