name: Gold Tracker Bot

on:
  schedule:
    # "0 * * * *" signifie : à la minute 0 de chaque heure
    - cron: '0 * * * *'
  workflow_dispatch: # Pour pouvoir le lancer à la main si besoin

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer les dépendances
        run: pip install yfinance

      - name: Exécuter le script
        run: python gold_update.py

      - name: Commit et Push
        run: |
          git config --global user.name "Gold-Bot"
          git config --global user.email "bot@github.com"
          git add JustTEST/bot_test/logger.txt
          git commit -m "Update Gold Price: $(date)" || echo "Pas de changement"
          git push
