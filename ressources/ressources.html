<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Open Source Resources</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 900: '#0c4a6e' } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); content-visibility: auto; contain-intrinsic-size: 150px; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.2); border-color: #0ea5e9; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased">
    <header class="sticky top-0 z-50 bg-gray-950/90 backdrop-blur-md border-b border-gray-800 pt-8 pb-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-500 to-purple-500 flex items-center gap-3">
                        <i data-lucide="database" class="w-8 h-8 text-brand-500"></i>
                        AI Open Source Hub
                    </h1>
                    <p class="text-gray-400 mt-2 text-sm max-w-xl">Répertoire local avec chargement prédictif.</p>
                </div>
                <div class="relative w-full md:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-gray-500"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-700 rounded-xl bg-gray-900 text-gray-300 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm"
                        placeholder="Rechercher...">
                </div>
            </div>
            <div class="flex items-center gap-2 mt-6 overflow-x-auto pb-2 scrollbar-hide" id="categoryFilters"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-6 flex justify-between items-center text-sm text-gray-400">
            <span id="resultsCount">Initialisation...</span>
        </div>

        <div id="resourcesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
        
        <div id="scrollSentinel" class="h-32 w-full flex items-center justify-center mt-6">
            <div id="loadingSpinner" class="hidden flex items-center gap-2 text-brand-500">
                <i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i>
                <span class="text-sm font-medium">Chargement invisible en cours...</span>
            </div>
        </div>

        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <i data-lucide="search-x" class="w-12 h-12 text-gray-600 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-200">Aucun résultat trouvé</h3>
        </div>
    </main>

    <script>
        const rawData = [
            { name: 'Cross-Platform', desc: 'Writing cross-platform code on Node.js.', link: 'github.com/bcoe/awesome-cross-platform-nodejs', category: 'GitHub', tags: ['platforms'] },
            { name: 'Frontend Development', desc: 'No description available', link: 'github.com/dypsilon/frontend-dev-bookmarks', category: 'GitHub', tags: ['platforms'] }
            // Collez vos données ici
        ];

        let processedResources = [], categories = [], tagCounts = {}, currentFilter = "Tout", searchQuery = "", filteredData = [];
        const ITEMS_PER_PAGE = 50; 
        let currentPage = 1;
        let isBatchLoading = false;

        const grid = document.getElementById('resourcesGrid'), 
              emptyState = document.getElementById('emptyState'), 
              searchInput = document.getElementById('searchInput'), 
              categoryFilters = document.getElementById('categoryFilters'), 
              resultsCount = document.getElementById('resultsCount'), 
              loadingSpinner = document.getElementById('loadingSpinner');

        function processData() {
            processedResources = rawData.map(item => {
                let link = (item.link || '').trim();
                if (link && !link.startsWith('http')) link = 'https://' + link;
                let tag = item.category || (item.tags && item.tags[0]) || 'General';
                
                let icon = "link-2", color = "text-blue-400";
                if (link.includes('github.com')) { icon = "github"; color = "text-gray-300"; }
                else if (link.includes('youtube.com')) { icon = "youtube"; color = "text-red-500"; }
                else if (link.includes('.pdf')) { icon = "file-text"; color = "text-orange-400"; }

                return {
                    ...item,
                    url: link,
                    displayUrl: link.replace(/^https?:\/\//, '').substring(0, 25) + '...',
                    filterTag: tag,
                    icon,
                    color
                };
            });

            processedResources.forEach(r => tagCounts[r.filterTag] = (tagCounts[r.filterTag] || 0) + 1);
            categories = ["Tout", ...Object.keys(tagCounts).sort((a, b) => tagCounts[b] - tagCounts[a]).slice(0, 25)];
        }

        function renderFilters() {
            categoryFilters.innerHTML = categories.map(cat => `
                <button onclick="setFilter('${cat}')" class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-all border ${currentFilter === cat ? 'bg-brand-500 text-white border-brand-500' : 'bg-gray-900 text-gray-400 border-gray-700 hover:border-gray-500'}">
                    ${cat} ${cat !== "Tout" ? `<span class="opacity-50 ml-1 text-xs">(${tagCounts[cat]})</span>` : ''}
                </button>
            `).join('');
        }

        function applyFilters() {
            const s = searchQuery.toLowerCase();
            filteredData = processedResources.filter(item => {
                const matchCat = currentFilter === "Tout" || item.filterTag === currentFilter;
                const matchSearch = !searchQuery || (item.name || '').toLowerCase().includes(s) || (item.desc || '').toLowerCase().includes(s);
                return matchCat && matchSearch;
            });

            grid.innerHTML = '';
            currentPage = 1;
            resultsCount.textContent = `${filteredData.length.toLocaleString()} ressources`;
            
            if (filteredData.length === 0) {
                emptyState.classList.replace('hidden', 'flex');
            } else {
                emptyState.classList.replace('flex', 'hidden');
                appendNextPage();
            }
        }

        function appendNextPage() {
            if (isBatchLoading) return;
            isBatchLoading = true;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const chunk = filteredData.slice(start, end);

            if (chunk.length === 0) {
                isBatchLoading = false;
                return;
            }

            const fragment = document.createDocumentFragment();
            chunk.forEach(item => {
                const div = document.createElement('div');
                div.className = "bg-gray-900 border border-gray-800 rounded-2xl p-5 card-hover flex flex-col h-full fade-in";
                div.innerHTML = `
                    <div class="text-[10px] font-bold text-gray-500 uppercase mb-2 tracking-tight">${item.filterTag}</div>
                    <div class="flex items-center gap-3 mb-3">
                        <i data-lucide="${item.icon}" class="w-5 h-5 ${item.color}"></i>
                        <h2 class="text-sm font-bold text-white line-clamp-1">${item.name}</h2>
                    </div>
                    <p class="text-gray-400 text-xs mb-4 flex-grow line-clamp-2">${item.desc || '...'}</p>
                    <a href="${item.url}" target="_blank" class="text-xs text-brand-500 font-medium truncate hover:underline">${item.displayUrl}</a>
                `;
                fragment.appendChild(div);
            });

            grid.appendChild(fragment);
            lucide.createIcons({ root: grid });
            
            loadingSpinner.classList.toggle('hidden', end >= filteredData.length);
            isBatchLoading = false;
        }

        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && currentPage * ITEMS_PER_PAGE < filteredData.length) {
                currentPage++;
                appendNextPage();
            }
        }, { 
            root: null, 
            rootMargin: '100px', // S'active 100px avant que le bas ne soit atteint
            threshold: 0.01 
        });
        
        observer.observe(document.getElementById('scrollSentinel'));

        window.setFilter = (c) => { currentFilter = c; renderFilters(); applyFilters(); };
        
        let timeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                searchQuery = e.target.value;
                applyFilters();
            }, 250);
        });

        function init() {
            processData();
            renderFilters();
            applyFilters();
            lucide.createIcons();
        }
        init();
    </script>
</body>
</html>
