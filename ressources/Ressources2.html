    {'name': 'Python Weekly', 'desc': 'No description available', 'link': 'www.pythonweekly.com/', 'category': 'Web', 'tags': ['python', 'open-source', 'newsletters']},
    {'name': 'Django Chat', 'desc': 'No description available', 'link': 'djangochat.com/', 'category': 'Web', 'tags': ['podcasts', 'open-source']},
    {'name': 'PyPodcats', 'desc': 'No description available', 'link': 'pypodcats.live', 'category': 'Web', 'tags': ['podcasts', 'open-source']},
    {'name': 'Python Bytes', 'desc': 'No description available', 'link': 'pythonbytes.fm', 'category': 'Web', 'tags': ['podcasts', 'open-source', 'python']},
    {'name': 'Python Test', 'desc': 'No description available', 'link': 'podcast.pythontest.com/', 'category': 'Web', 'tags': ['podcasts', 'open-source', 'python']},
    {'name': 'Talk Python To Me', 'desc': 'No description available', 'link': 'talkpython.fm/', 'category': 'Web', 'tags': ['podcasts', 'open-source', 'python']},
    {'name': 'The Real Python Podcast', 'desc': 'No description available', 'link': 'realpython.com/podcasts/rpp/', 'category': 'Web', 'tags': ['podcasts', 'open-source', 'python']}
        ];

        // 2. Intelligent Pre-processing
        const processedResources = rawData.map(item => {
            // Fix URLs to ensure they are clickable
            let cleanLink = item.link.trim();
            if (!cleanLink.startsWith('http')) {
                cleanLink = 'https://' + cleanLink;
            }

            // Auto-categorize based on domain or name
            let category = "Tools & Platforms";
            let icon = "wrench";
            let color = "text-blue-400";

            if (item.link.includes('github.com')) {
                category = "Code & Repos";
                icon = "github";
                color = "text-gray-300";
            } else if (item.link.includes('youtube.com') || item.name.toLowerCase().includes('cours')) {
                category = "Learning & Media";
                icon = "youtube";
                color = "text-red-500";
            } else if (item.link.includes('huggingface.co') || item.name.toLowerCase().includes('llama') || item.name.toLowerCase().includes('mistral')) {
                category = "Models & Hubs";
                icon = "box";
                color = "text-yellow-400";
            } else if (['PyTorch', 'Tensor flow', 'Scikit-learn', 'NLTK', 'OpenCV'].includes(item.name)) {
                category = "Frameworks & Libs";
                icon = "library";
                color = "text-emerald-400";
            }

            return {
                ...item,
                url: cleanLink,
                displayUrl: item.link.replace(/^https?:\/\//, '').replace(/\/$/, ''),
                category,
                icon,
                color
            };
        });

        // State
        let currentFilter = "All";
        let searchQuery = "";

        // DOM Elements
        const grid = document.getElementById('resourcesGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilters = document.getElementById('categoryFilters');
        const resultsCount = document.getElementById('resultsCount');

        // Extract unique categories
        const categories = ["All", ...new Set(processedResources.map(r => r.category))];

        // 3. Render Functions
        function renderFilters() {
            categoryFilters.innerHTML = categories.map(cat => `
                <button onclick="setFilter('${cat}')" 
                    class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors border ${
                        currentFilter === cat 
                        ? 'bg-brand-500 text-white border-brand-500' 
                        : 'bg-gray-900 text-gray-400 border-gray-700 hover:bg-gray-800 hover:text-white'
                    }">
                    ${cat}
                </button>
            `).join('');
        }

        function renderGrid() {
            // Filter data
            const filtered = processedResources.filter(item => {
                const matchesCategory = currentFilter === "All" || item.category === currentFilter;
                const searchLower = searchQuery.toLowerCase();
                const matchesSearch = item.name.toLowerCase().includes(searchLower) || 
                                      item.desc.toLowerCase().includes(searchLower) ||
                                      item.link.toLowerCase().includes(searchLower);
                return matchesCategory && matchesSearch;
            });

            // Update UI
            resultsCount.textContent = `Showing ${filtered.length} resource${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                grid.innerHTML = filtered.map((item, index) => `
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 card-hover flex flex-col h-full fade-in relative group" style="animation-delay: ${index * 0.05}s">
                        
                        <!-- Badge -->
                        <div class="absolute top-4 right-4 bg-gray-800 px-2 py-1 rounded text-[10px] font-semibold text-gray-400 uppercase tracking-wider">
                            ${item.category}
                        </div>

                        <!-- Header -->
                        <div class="flex items-center gap-4 mb-4 mt-2">
                            <div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center shrink-0">
                                <i data-lucide="${item.icon}" class="w-6 h-6 ${item.color}"></i>
                            </div>
                            <h2 class="text-lg font-bold text-white leading-tight pr-12">${item.name}</h2>
                        </div>
                        
                        <!-- Description -->
                        <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3" title="${item.desc}">
                            ${item.desc}
                        </p>
                        
                        <!-- Footer / Link -->
                        <div class="pt-4 border-t border-gray-800 mt-auto">
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                               class="flex items-center justify-between group/link hover:text-brand-500 transition-colors w-full">
                                <div class="flex items-center gap-2 overflow-hidden">
                                    <i data-lucide="link" class="w-4 h-4 text-gray-500 group-hover/link:text-brand-500 shrink-0"></i>
                                    <span class="text-sm font-medium text-gray-300 group-hover/link:text-brand-500 truncate">
                                        ${item.displayUrl}
                                    </span>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 text-gray-600 group-hover/link:text-brand-500 shrink-0 transition-transform group-hover/link:-translate-y-0.5 group-hover/link:translate-x-0.5"></i>
                            </a>
                        </div>
                    </div>
                `).join('');
                
                // Re-initialize icons for newly added DOM elements
                lucide.createIcons();
            }
        }

        // 4. Event Listeners
        window.setFilter = (category) => {
            currentFilter = category;
            renderFilters();
            renderGrid();
        };

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
        });

        // 5. Initialize
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderFilters();
            renderGrid();
        });
    </script>
</body>
</html>
