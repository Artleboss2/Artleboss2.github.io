<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Open Source Resources</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.2), 0 8px 10px -6px rgba(14, 165, 233, 0.1);
            border-color: #0ea5e9;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen antialiased selection:bg-brand-500 selection:text-white">

    <!-- Header Section -->
    <header class="sticky top-0 z-50 bg-gray-950/80 backdrop-blur-md border-b border-gray-800 pt-8 pb-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-brand-500 to-purple-500 flex items-center gap-3">
                        <i data-lucide="brain-circuit" class="w-8 h-8 text-brand-500"></i>
                        AI Open Source Hub
                    </h1>
                    <p class="text-gray-400 mt-2 text-sm max-w-xl">
                        A curated, intelligent directory of the best open-source artificial intelligence models, tools, and learning resources.
                    </p>
                </div>
                
                <!-- Search Bar -->
                <div class="relative w-full md:w-96">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="w-5 h-5 text-gray-500"></i>
                    </div>
                    <input type="text" id="searchInput" 
                        class="block w-full pl-10 pr-3 py-3 border border-gray-700 rounded-xl leading-5 bg-gray-900 text-gray-300 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 sm:text-sm transition-shadow"
                        placeholder="Search resources, models, or descriptions...">
                </div>
            </div>

            <!-- Categories / Tags (Auto-generated by JS) -->
            <div class="flex items-center gap-2 mt-6 overflow-x-auto pb-2 scrollbar-hide" id="categoryFilters">
                <!-- Filter buttons injected here -->
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Results count -->
        <div class="mb-6 flex justify-between items-center text-sm text-gray-400">
            <span id="resultsCount">Loading resources...</span>
        </div>

        <!-- Grid Container -->
        <div id="resourcesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards will be injected here by JS -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="bg-gray-800 p-4 rounded-full mb-4">
                <i data-lucide="search-x" class="w-8 h-8 text-gray-400"></i>
            </div>
            <h3 class="text-lg font-medium text-gray-200">No resources found</h3>
            <p class="text-gray-500 mt-1">Try adjusting your search or category filter.</p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 mt-12 py-8 text-center text-sm text-gray-500">
        <p>Built with ❤️ and embedded data from your CSV.</p>
    </footer>

    <!-- Application Logic -->
    <script>
        // 1. Embedded Data from CSV
        const rawData = [
            { name: "Hugging Face", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "Huggingface.co" },
            { name: "PyTorch", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "pytorch.org" },
            { name: "Tensor flow", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "Tensorflow.org" },
            { name: "Ollama", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "ollama.com" },
            { name: "LangChain", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "Langchain.com" },
            { name: "Mistral 7B /8x7B", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "mistral.ai" },
            { name: "Llama 3 (Meta)", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "Llama.meta.com" },
            { name: "Stable Diffusion", desc: "La plateforme centrale pour les modèles, datasets et démos (le \"GitHub de l'IA\")", link: "https://github.com/Stability-AI/stablediffusion" },
            { name: "Automatic1111", desc: "L'interface WebUI la plus complète pour utiliser Stable Diffusion.", link: "github.com/AUTOMATIC1111/stable-diffusion-webui" },
            { name: "Three.js (Ai nodes)", desc: "L'interface WebUI la plus complète pour utiliser Stable Diffusion.", link: "threejs.org" },
            { name: "AutoGPT", desc: "Agent autonome capable d'exécuter des tâches complexes par lui-même.", link: "github.com/Significant-Gravitas/AutoGPT" },
            { name: "vLLM", desc: "Agent autonome capable d'exécuter des tâches complexes par lui-même.", link: "github.com/vllm-project/vllm" },
            { name: "LocalGPT", desc: "Agent autonome capable d'exécuter des tâches complexes par lui-même.", link: "github.com/PromptEngineer/localGPT" },
            { name: "DeepSpeed", desc: "Optimisation logicielle de Microsoft pour l'entraînement de modèles géants.", link: "deepspeed.ai" },
            { name: "Scikit-learn", desc: "La bibliothèque de référence pour le machine learning classique en Python.", link: "scikit-learn.org" },
            { name: "Andrej Karpathy (YouTube)", desc: "La bibliothèque de référence pour le machine learning classique en Python.", link: "youtube.com/@AndrejKarpathy" },
            { name: "Two Minute Papers", desc: "La bibliothèque de référence pour le machine learning classique en Python.", link: "youtube.com/@TwoMinutePapers" },
            { name: "Paper with code", desc: "La bibliothèque de référence pour le machine learning classique en Python.", link: "paperswithcode.com" },
            { name: "ComfyUI", desc: "La bibliothèque de référence pour le machine learning classique en Python.", link: "github.com/comfyanonymous/ComfyUI" },
            { name: "Fast.ai", desc: "Cours et bibliothèque pour rendre le deep learning accessible à tous.", link: "fast.ai" },
            { name: "NLTK", desc: "Plateforme pour construire des programmes traitant des données de langage humain.", link: "nltk.org" },
            { name: "OpenCV", desc: "Plateforme pour construire des programmes traitant des données de langage humain.", link: "opencv.org" },
            { name: "CrewAI", desc: "Plateforme pour construire des programmes traitant des données de langage humain.", link: "crewai.com" },
            { name: "GroqCloud", desc: "Plateforme pour tester l'inférence ultra-rapide des modèles open source.", link: "groq.com" },
            { name: "GGUF (Format)", desc: "Format de fichier pour optimiser les modèles sur du hardware grand public.", link: "github.com/ggerganov/llama.cpp" }
        ];

        // 2. Intelligent Pre-processing
        const processedResources = rawData.map(item => {
            // Fix URLs to ensure they are clickable
            let cleanLink = item.link.trim();
            if (!cleanLink.startsWith('http')) {
                cleanLink = 'https://' + cleanLink;
            }

            // Auto-categorize based on domain or name
            let category = "Tools & Platforms";
            let icon = "tool";
            let color = "text-blue-400";

            if (item.link.includes('github.com')) {
                category = "Code & Repos";
                icon = "github";
                color = "text-gray-300";
            } else if (item.link.includes('youtube.com') || item.name.toLowerCase().includes('cours')) {
                category = "Learning & Media";
                icon = "youtube";
                color = "text-red-500";
            } else if (item.link.includes('huggingface.co') || item.name.toLowerCase().includes('llama') || item.name.toLowerCase().includes('mistral')) {
                category = "Models & Hubs";
                icon = "box";
                color = "text-yellow-400";
            } else if (['PyTorch', 'Tensor flow', 'Scikit-learn', 'NLTK', 'OpenCV'].includes(item.name)) {
                category = "Frameworks & Libs";
                icon = "library";
                color = "text-emerald-400";
            }

            return {
                ...item,
                url: cleanLink,
                displayUrl: item.link.replace(/^https?:\/\//, '').replace(/\/$/, ''),
                category,
                icon,
                color
            };
        });

        // State
        let currentFilter = "All";
        let searchQuery = "";

        // DOM Elements
        const grid = document.getElementById('resourcesGrid');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const categoryFilters = document.getElementById('categoryFilters');
        const resultsCount = document.getElementById('resultsCount');

        // Extract unique categories
        const categories = ["All", ...new Set(processedResources.map(r => r.category))];

        // 3. Render Functions
        function renderFilters() {
            categoryFilters.innerHTML = categories.map(cat => `
                <button onclick="setFilter('${cat}')" 
                    class="px-4 py-1.5 rounded-full text-sm font-medium whitespace-nowrap transition-colors border ${
                        currentFilter === cat 
                        ? 'bg-brand-500 text-white border-brand-500' 
                        : 'bg-gray-900 text-gray-400 border-gray-700 hover:bg-gray-800 hover:text-white'
                    }">
                    ${cat}
                </button>
            `).join('');
        }

        function renderGrid() {
            // Filter data
            const filtered = processedResources.filter(item => {
                const matchesCategory = currentFilter === "All" || item.category === currentFilter;
                const searchLower = searchQuery.toLowerCase();
                const matchesSearch = item.name.toLowerCase().includes(searchLower) || 
                                      item.desc.toLowerCase().includes(searchLower) ||
                                      item.link.toLowerCase().includes(searchLower);
                return matchesCategory && matchesSearch;
            });

            // Update UI
            resultsCount.textContent = `Showing ${filtered.length} resource${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');
                
                grid.innerHTML = filtered.map((item, index) => `
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 card-hover flex flex-col h-full fade-in relative group" style="animation-delay: ${index * 0.05}s">
                        
                        <!-- Badge -->
                        <div class="absolute top-4 right-4 bg-gray-800 px-2 py-1 rounded text-[10px] font-semibold text-gray-400 uppercase tracking-wider">
                            ${item.category}
                        </div>

                        <!-- Header -->
                        <div class="flex items-center gap-4 mb-4 mt-2">
                            <div class="w-12 h-12 rounded-xl bg-gray-800 flex items-center justify-center shrink-0">
                                <i data-lucide="${item.icon}" class="w-6 h-6 ${item.color}"></i>
                            </div>
                            <h2 class="text-lg font-bold text-white leading-tight pr-12">${item.name}</h2>
                        </div>
                        
                        <!-- Description -->
                        <p class="text-gray-400 text-sm mb-6 flex-grow line-clamp-3" title="${item.desc}">
                            ${item.desc}
                        </p>
                        
                        <!-- Footer / Link -->
                        <div class="pt-4 border-t border-gray-800 mt-auto">
                            <a href="${item.url}" target="_blank" rel="noopener noreferrer" 
                               class="flex items-center justify-between group/link hover:text-brand-500 transition-colors w-full">
                                <div class="flex items-center gap-2 overflow-hidden">
                                    <i data-lucide="link" class="w-4 h-4 text-gray-500 group-hover/link:text-brand-500 shrink-0"></i>
                                    <span class="text-sm font-medium text-gray-300 group-hover/link:text-brand-500 truncate">
                                        ${item.displayUrl}
                                    </span>
                                </div>
                                <i data-lucide="external-link" class="w-4 h-4 text-gray-600 group-hover/link:text-brand-500 shrink-0 transition-transform group-hover/link:-translate-y-0.5 group-hover/link:translate-x-0.5"></i>
                            </a>
                        </div>
                    </div>
                `).join('');
                
                // Re-initialize icons for newly added DOM elements
                lucide.createIcons();
            }
        }

        // 4. Event Listeners
        window.setFilter = (category) => {
            currentFilter = category;
            renderFilters();
            renderGrid();
        };

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGrid();
        });

        // 5. Initialize
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderFilters();
            renderGrid();
        });
    </script>
</body>
</html>
